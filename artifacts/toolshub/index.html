    <!-- ═══ DYNAMIC CANONICAL UPDATER — updates canonical for each page route ═══ -->
    <script>
      (function() {
        var base = 'https://toolshub-mauve.vercel.app';
        function updateCanonical() {
          var canonical = document.querySelector('link[rel="canonical"]');
          if (canonical) {
            canonical.setAttribute('href', base + window.location.pathname);
          }
        }
        // Update on page load
        updateCanonical();
        // Update when React Router changes page (catches client-side navigation)
        var _pushState = history.pushState;
        var _replaceState = history.replaceState;
        history.pushState = function() {
          _pushState.apply(history, arguments);
          setTimeout(updateCanonical, 50);
        };
        history.replaceState = function() {
          _replaceState.apply(history, arguments);
          setTimeout(updateCanonical, 50);
        };
        window.addEventListener('popstate', function() {
          setTimeout(updateCanonical, 50);
        });
      })();
    </script>
